  /journalEntry:
    post:
      tags: [Journal Entries]
      summary: Create a balanced journal entry
      description: |
        Roles: SUPER-ADMIN, ADMIN, ACCOUNTING. SUM(debit) must equal SUM(credit).
        ⚠️ Period Lock: إذا كانت الفترة المحاسبية لشهر entry_date مقفولة → 403
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalEntryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/JournalEntry'
        '400':
          description: Unbalanced entry or validation error
        '401':
          description: Unauthorized
        '403':
          $ref: '#/components/responses/PeriodClosed'
    get:
      tags: [Journal Entries]
      summary: List journal entries
      description: "Allowed Roles: SUPER-ADMIN, ADMIN, ACCOUNTING"
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/fieldsParam'
        - $ref: '#/components/parameters/keywordParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEntry'

  /journalEntry/{id}:
    get:
      tags: [Journal Entries]
      summary: Get journal entry with lines
      description: "Allowed Roles: SUPER-ADMIN, ADMIN, ACCOUNTING"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 55
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/JournalEntry'
        '404':
          description: Not found
    patch:
      tags: [Journal Entries]
      summary: Update journal entry status
      description: |
        Roles: SUPER-ADMIN, ADMIN, ACCOUNTING. Only status can be changed.
        ⚠️ Period Lock: إذا كانت الفترة المحاسبية لشهر entry_date مقفولة → 403
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 55
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, posted, cancelled]
                  example: cancelled
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/JournalEntry'
        '400':
          description: Invalid status transition
        '403':
          $ref: '#/components/responses/PeriodClosed'
    delete:
      tags: [Journal Entries]
      summary: Soft-delete or restore journal entry
      description: |
        Roles: SUPER-ADMIN, ADMIN, ACCOUNTING
        ⚠️ Period Lock: إذا كانت الفترة المحاسبية لشهر entry_date مقفولة → 403
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 55
      responses:
        '200':
          description: Toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/JournalEntry'
        '403':
          $ref: '#/components/responses/PeriodClosed'

  /accountingPeriod:
    post:
      tags: [Accounting Periods]
      summary: إنشاء فترة محاسبية جديدة
      description: "Roles: SUPER-ADMIN, ADMIN, ACCOUNTING"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [month, year]
              properties:
                month:
                  type: integer
                  minimum: 1
                  maximum: 12
                year:
                  type: integer
                  minimum: 2000
                  maximum: 2100
                status:
                  type: string
                  enum: [open, closed]
                  default: open
            example:
              month: 6
              year: 2026
              status: open
      responses:
        '201':
          description: تم إنشاء الفترة
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: الفترة موجودة مسبقاً أو بيانات غير صحيحة
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags: [Accounting Periods]
      summary: قائمة الفترات المحاسبية
      description: "Roles: SUPER-ADMIN, ADMIN, ACCOUNTING, HR"
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed]
        - $ref: '#/components/parameters/yearParam'
      responses:
        '200':
          description: قائمة الفترات
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /accountingPeriod/{id}:
    get:
      tags: [Accounting Periods]
      summary: تفاصيل فترة محاسبية
      description: "Roles: SUPER-ADMIN, ADMIN, ACCOUNTING, HR"
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: تفاصيل الفترة
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/AccountingPeriod'
        '404':
          description: الفترة غير موجودة
    patch:
      tags: [Accounting Periods]
      summary: تعديل حالة الفترة (فتح/إغلاق)
      description: |
        Roles: SUPER-ADMIN, ADMIN, ACCOUNTING
        ⚠️ إغلاق الفترة يمنع أي تعديل على بيانات هذا الشهر في كل الـ modules
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, closed]
            example:
              status: closed
      responses:
        '200':
          description: تم التعديل
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
