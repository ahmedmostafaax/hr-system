paths:
  /user:
    post:
      tags: [Users]
      summary: Registers a new user
      description: |
        Roles: SUPER-ADMIN, ADMIN
        ⚠️ كلمة المرور الافتراضية = random password آمن (16 char hex)
        force_reset_password = true تلقائياً
        ⚠️ كلمة المرور **لا تُرجع** في response الإنشاء — استخدم POST /user/{id}/resetPassword للحصول عليها مرة واحدة
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, phoneNumber]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 100
                  example: محمود علي عبد الرحمن
                email:
                  type: string
                  pattern: ^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(com|net|org|edu|gov)$
                  example: mahmoud.ali@company.com
                phoneNumber:
                  type: string
                  pattern: ^01[0-2,5]{1}[0-9]{8}$
                  example: "01012345678"
                role:
                  type: string
                  enum: [SUPER-ADMIN, ADMIN, HR, ACCOUNTING]
                  example: HR
      responses:
        '201':
          description: تم إنشاء المستخدم
          content:
            application/json:
              example:
                meta:
                  status: 201
                  success: true
                  message: User created successfully
                data:
                  id: 5
                  name: "محمد علي"
                  email: "m.ali@company.com"
                  role: "HR"
                  force_reset_password: true
        '400':
          description: Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMeta'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient roles)
    get:
      tags: [Users]
      summary: Retrieve all users
      description: "Allowed Roles: SUPER-ADMIN, ADMIN"
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/fieldsParam'
        - $ref: '#/components/parameters/keywordParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
  /user/{id}:
    get:
      tags: [Users]
      summary: Get single user details
      description: "Allowed Roles: SUPER-ADMIN, ADMIN"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
    patch:
      tags: [Users]
      summary: Update user configurations
      description: "Allowed Roles: SUPER-ADMIN, ADMIN"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 100
                  example: محمد السيد المعدل
                email:
                  type: string
                  pattern: ^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(com|net|org|edu|gov)$
                  example: mohamed.elsayed.updated@company.com
                phoneNumber:
                  type: string
                  pattern: ^01[0-2,5]{1}[0-9]{8}$
                  example: "01234567890"
                role:
                  type: string
                  enum: [ADMIN, HR, ACCOUNTING]
                  example: ACCOUNTING
                isActive:
                  type: boolean
                  example: true
                isBlock:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/User'
    delete:
      tags: [Users]
      summary: Toggle delete state of user
      description: "Allowed Roles: SUPER-ADMIN, ADMIN"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/User'

  /user/{id}/resetPassword:
    post:
      tags: [Users]
      summary: إعادة تعيين كلمة مرور مستخدم
      description: |
        Roles: SUPER-ADMIN, ADMIN
        يولّد random password جديد + يضع force_reset_password=true
        الـ password يظهر في الـ response مرة واحدة فقط
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: تم إعادة التعيين
          content:
            application/json:
              example:
                meta:
                  status: 200
                  success: true
                  message: Password reset successfully
                data:
                  user:
                    id: 5
                    name: "محمد علي"
                    role: "HR"
                  password: "9f2a4b8c1d3e6f0a"
        '404':
          description: المستخدم غير موجود

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user credentials
      description: "⚠️ No authentication required"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier:
                  type: string
                  example: ahmed.hossam@company.com
                password:
                  type: string
                  minLength: 6
                  example: Password123
      responses:
        '200':
          description: تسجيل دخول ناجح
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          role:
                            type: string
                      force_reset_password:
                        type: boolean
                        description: |
                          true = المستخدم لازم يغيّر كلمة مروره فوراً
                          الـ frontend يوجّه لشاشة PATCH /auth/changePassword
              example:
                meta:
                  status: 200
                  success: true
                  message: "Login successful — password reset required"
                data:
                  token: "eyJhbGci..."
                  user:
                    id: 5
                    name: "محمد علي"
                    role: "HR"
                  force_reset_password: true
        '400':
          description: Invalid input format
        '401':
          description: Incorrect email/phone or password

  /auth/forgetPassword:
    post:
      tags: [Auth]
      summary: Dispatch recovery code to email
      description: "⚠️ No authentication required"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: ahmed.hossam@company.com
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: object
                    nullable: true

  /auth/verifyResetCode:
    post:
      tags: [Auth]
      summary: Verify the recovery token
      description: "⚠️ No authentication required"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  pattern: ^\d+$
                  example: "384915"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: object
                    nullable: true
        '400':
          description: Invalid or expired code

  /auth/resetPassword:
    patch:
      tags: [Auth]
      summary: Reset password with code validated email
      description: "⚠️ No authentication required"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, newPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: ahmed.hossam@company.com
                newPassword:
                  type: string
                  minLength: 6
                  example: NewSecurePassword456
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          role:
                            type: string

  /auth/changePassword:
    patch:
      tags: [Auth]
      summary: Update existing password
      description: "Allowed Roles: Any Authenticated User"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, newPassword]
              properties:
                password:
                  type: string
                  example: Password123
                newPassword:
                  type: string
                  minLength: 6
                  example: NewBetterPassword789
      responses:
        '200':
          description: OK
