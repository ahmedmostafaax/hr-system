          $ref: '#/components/responses/Forbidden'
        '404':
          description: الفترة غير موجودة

  /auditLog:
    get:
      tags: [Audit Log]
      summary: سجل المراجعة والتدقيق
      description: |
        Roles: SUPER-ADMIN, ADMIN فقط
        ⚠️ Read-only — لا يمكن إنشاء أو تعديل أو حذف سجلات المراجعة
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/entityTypeParam'
        - name: entity_id
          in: query
          schema:
            type: integer
          description: فلترة بمعرف الكيان (مثلاً id موظف معين)
        - name: user_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/actionParam'
        - name: from_date
          in: query
          schema:
            type: string
            format: date
          example: "2026-06-01"
        - name: to_date
          in: query
          schema:
            type: string
            format: date
          example: "2026-06-30"
      responses:
        '200':
          description: قائمة سجلات المراجعة
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
              example:
                meta:
                  status: 200
                  success: true
                  pagination:
                    page: 1
                    limit: 20
                    totalItems: 150
                    totalPages: 8
                data:
                  - id: 1
                    user_id: 3
                    user_name: "أحمد مدير"
                    user_role: "ADMIN"
                    action: "APPROVE"
                    entity_type: "EmployeeLoan"
                    entity_id: 12
                    old_values:
                      approval_status: "pending"
                    new_values:
                      approval_status: "approved"
                    created_at: "2026-06-15T10:30:00.000Z"
        '403':
          $ref: '#/components/responses/Forbidden'

  /health:
    get:
      tags: [System]
      summary: فحص حالة النظام
      description: |
        ⚠️ بدون Authentication — مسار على root server (http://localhost:5000/health)
        يفحص: DB connection + Email config
        يُرجع 503 إذا DB DOWN
      servers:
        - url: http://localhost:5000
      responses:
        '200':
          description: النظام يعمل
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: UP
                timestamp: "2026-06-18T10:00:00.000Z"
                uptime: 3600.5
                services:
                  database:
                    status: UP
                  email:
                    status: CONFIGURED
        '503':
          description: النظام أو DB يعاني من مشكلة
          content:
            application/json:
              example:
                status: DEGRADED
                services:
                  database:
                    status: DOWN
                    error: "Connection refused"
                  email:
                    status: CONFIGURED
