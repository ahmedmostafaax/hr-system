  /employeeLoan:
    post:
      tags: [Employee Loans]
      summary: Registers a loan / advance
      description: |
        Roles: SUPER-ADMIN, ADMIN, HR
        ⚠️ السلفة/القرض تُنشأ بحالة approval_status=pending تلقائياً
        القيد المحاسبي لا يُنشأ إلا بعد الموافقة (PATCH approval_status=approved)
        ⚠️ Period Lock: إذا كانت الفترة المحاسبية لشهر grant_date مقفولة → 403
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_id, type, amount, grant_date, status]
              properties:
                employee_id:
                  type: integer
                  example: 5
                type:
                  type: string
                  enum: [advance, loan]
                  example: loan
                amount:
                  type: number
                  minimum: 0
                  example: 12000.00
                grant_date:
                  type: string
                  format: date
                  example: "2026-06-01"
                installment_amount:
                  type: number
                  minimum: 0
                  nullable: true
                  example: 1000.00
                paid_amount:
                  type: number
                  minimum: 0
                  example: 0.00
                status:
                  type: string
                  enum: [active, settled]
                  example: active
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/EmployeeLoan'
        '403':
          $ref: '#/components/responses/PeriodClosed'
    get:
      tags: [Employee Loans]
      summary: Retrieve all loans and advances
      description: "Allowed Roles: SUPER-ADMIN, ADMIN, HR, ACCOUNTING"
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/fieldsParam'
        - $ref: '#/components/parameters/keywordParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmployeeLoan'
  /employeeLoan/{id}:
    get:
      tags: [Employee Loans]
      summary: Single loan/advance detail profile
      description: "Allowed Roles: SUPER-ADMIN, ADMIN, HR, ACCOUNTING"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/EmployeeLoan'
    patch:
      tags: [Employee Loans]
      summary: Update loan parameters or approval state
      description: |
        Roles: SUPER-ADMIN, ADMIN, HR, ACCOUNTING (PATCH)
        تعديل بيانات: HR, ADMIN, SUPER-ADMIN
        تغيير approval_status → approved/rejected: ACCOUNTING, ADMIN, SUPER-ADMIN فقط

        عند approval_status=approved:
          → emit LOAN_CREATED → JE loan_grant ينشأ
          → approved_by = req.user.id

        عند approval_status=rejected:
          → rejection_reason (اختياري)

        ⚠️ تعديل amount بعد الموافقة → emit LOAN_UPDATED → JE loan_grant_adjustment
        ⚠️ Period Lock: POST/PATCH/DELETE على شهر grant_date مقفول → 403
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employee_id:
                  type: integer
                  example: 5
                type:
                  type: string
                  enum: [advance, loan]
                  example: loan
                amount:
                  type: number
                  minimum: 0
                  example: 12000.00
                grant_date:
                  type: string
                  format: date
                  example: "2026-06-01"
                installment_amount:
                  type: number
                  minimum: 0
                  nullable: true
                  example: 1200.00
                paid_amount:
                  type: number
                  minimum: 0
                  example: 3600.00
                status:
                  type: string
                  enum: [active, settled]
                  example: active
                approval_status:
                  type: string
                  enum: [pending, approved, rejected]
                rejection_reason:
                  type: string
                  description: يُستخدم عند rejection
                  nullable: true
                is_deleted:
                  type: boolean
                  example: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/EmployeeLoan'
        '403':
          $ref: '#/components/responses/PeriodClosed'
    delete:
      tags: [Employee Loans]
      summary: Soft-delete or restore loan
      description: |
        Roles: SUPER-ADMIN, ADMIN, HR
        Soft-delete toggle
        ⚠️ إذا كانت السلفة approved وعندها JE:
          → emit LOAN_DELETED → JE loan_grant_reversal ينشأ تلقائياً
        ⚠️ Period Lock: إذا كانت فترة grant_date مقفولة → 403
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    $ref: '#/components/schemas/EmployeeLoan'
        '403':
          $ref: '#/components/responses/PeriodClosed'

