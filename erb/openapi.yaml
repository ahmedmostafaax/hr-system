                  example: 6
                year:
                  type: integer
                  minimum: 2000
                  maximum: 2100
                  example: 2026
                status:
                  type: string
                  enum: [draft, confirmed, paid]
                  example: draft
                auto_process:
                  type: boolean
                  default: true
                  description: When true (default), bulk-calculates all employees and confirms the run automatically
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
