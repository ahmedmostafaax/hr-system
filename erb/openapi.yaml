openapi: 3.0.3
info:
  title: ERB Payroll & HR System API
  version: 2.0.0
  description: |
    نظام ERP للموارد البشرية والرواتب والمحاسبة

    ## التغييرات في v2.0.0
    - إضافة Accounting Periods (Period Locking)
    - إضافة Audit Log
    - Approval Workflow للسلف والمكافآت
    - Reversal Entries للسلف والمكافآت المحذوفة/المعدّلة
    - Password Policy محسّنة (force_reset_password)
    - Health Check حقيقي مع فحص DB
    - Notification System (Email)
    - Payroll Transaction الشاملة (JEs في نفس transaction)
  contact:
    name: Backend Team
  license:
    name: Private
servers:
  - url: http://localhost:5000/api/v1
    description: API v1 base path
  - url: http://localhost:5000
    description: Root server (health check at /health)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    pageParam:
      in: query
      name: page
      description: Page number for pagination
      schema:
        type: integer
        default: 1
    limitParam:
      in: query
      name: limit
      description: Number of items to return per page
      schema:
        type: integer
        default: 20
    sortParam:
      in: query
      name: sort
      description: Field ordering, e.g., 'date', 'name', or comma-separated fields
      schema:
        type: string
    fieldsParam:
      in: query
      name: fields
      description: Comma-separated list of fields to exclude from response
      schema:
        type: string
    keywordParam:
      in: query
      name: keyword
      description: Search keyword matching module fields
      schema:
        type: string
    idParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
    monthParam:
      name: month
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 12
    yearParam:
      name: year
      in: query
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
    entityTypeParam:
      name: entity_type
      in: query
      schema:
        type: string
        enum: [Employee, PayrollRun, EmployeeLoan, EmployeeBonus, JournalEntry, LeaveRequest, Contract, User, AccountingPeriod]
    actionParam:
      name: action
      in: query
      schema:
        type: string
        enum: [CREATE, UPDATE, DELETE, LOGIN, LOGOUT, APPROVE, REJECT]
  responses:
    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMeta'
    Forbidden:
      description: Forbidden — insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMeta'
    PeriodClosed:
      description: الفترة المحاسبية مقفولة أو الدور غير مصرح
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PeriodClosedError'
  schemas:
    Meta:
      type: object
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            totalItems:
              type: integer
              example: 100
            totalPages:
              type: integer
              example: 5
    ErrorMeta:
      type: object
      properties:
        status:
          type: integer
          example: 400
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid input provided
    User:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: محمد السيد
        email:
          type: string
          example: mohamed.elsayed@company.com
        phoneNumber:
          type: string
          example: "01234567890"
        role:
          type: string
          enum: [SUPER-ADMIN, ADMIN, HR, ACCOUNTING]
          example: ADMIN
        isActive:
          type: boolean
          example: true
        isBlock:
          type: boolean
          example: false
        is_deleted:
          type: boolean
          example: false
        force_reset_password:
          type: boolean
          default: false
          example: true
    Department:
      type: object
      properties:
        id:
          type: integer
          example: 4
        name:
          type: string
          example: قسم الموارد البشرية
        parent_id:
          type: integer
          nullable: true
          example: null
        type:
          type: string
          example: main
        isActive:
          type: boolean
          example: true
        is_deleted:
          type: boolean
          example: false
    Shift:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: وردية العمل العادية
        type:
          type: string
          enum: [morning, evening, between]
          example: morning
        work_days:
          type: array
          items:
            type: string
            enum: [sat, sun, mon, tue, wed, thu, fri]
          example: [sun, mon, tue, wed, thu]
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "17:00"
        grace_minutes:
          type: integer
          example: 15
        deduct_grace:
          type: boolean
          example: true
        salary_basis_days:
          type: integer
          example: 26
        is_deleted:
          type: boolean
          example: false
    LeaveType:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: إجازة سنوية اعتيادية
        annual_balance:
          type: integer
          example: 21
        affects_deduction:
          type: boolean
          example: false
        is_deleted:
          type: boolean
          example: false
    OfficialHoliday:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: عيد الفطر المبارك
        start_date:
          type: string
          format: date
          example: "2026-03-20"
        days_count:
          type: integer
          example: 3
    Account:
      type: object
      properties:
        id:
          type: integer
          example: 6
        name:
          type: string
          example: مصروفات الرواتب والأجور
        code:
          type: string
          example: "51001"
        type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
          example: expense
        parent_id:
          type: integer
          nullable: true
          example: null
        description:
          type: string
          nullable: true
          example: الحساب العام لإثبات رواتب الموظفين
        currency:
          type: string
          example: EGP
    AllowanceType:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: بدل انتقال وسفر
        default_amount:
          type: number
          example: 1200.00
        is_part_of_salary:
          type: boolean
          example: true
        account_code:
          type: string
          example: "52002"
    AbsenceType:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: غياب بدون عذر مقبول
        deduct_days:
          type: number
          example: 2.0
        requires_permission:
          type: boolean
          example: false
    BonusType:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: مكافأة تميز سنوية
        payment_type:
          type: string
          enum: [cash, deferred]
          example: deferred
        default_amount:
          type: number
          nullable: true
          example: 5000.00
        editable_amount:
          type: boolean
          example: true
    InsuranceSetting:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_rate:
          type: number
          example: 11.00
        company_rate:
          type: number
          example: 18.75
        effective_from:
          type: string
          format: date
          example: "2026-01-01"
    Employee:
      type: object
      properties:
        id:
          type: integer
          example: 5
        code:
          type: string
          example: EMP-2026-003
        full_name:
          type: string
          example: سامح محمد محمود
        birth_date:
          type: string
          format: date
          example: "1994-05-12"
        gender:
          type: string
          enum: [M, F]
          example: M
        national_id:
          type: string
          example: "29405120102345"
        phone_number:
          type: string
          example: "01099887766"
        phone:
          type: string
          nullable: true
          example: null
        email:
          type: string
          nullable: true
          example: sameh.mohamed@company.com
        address:
          type: string
          nullable: true
          example: الدقي، الجيزة
        marital_status:
          type: string
          enum: [single, married, divorced, widowed]
          example: married
        qualification:
          type: string
          nullable: true
          example: بكالوريوس هندسة حاسبات
        bank_name:
          type: string
          nullable: true
          example: البنك الأهلي المصري
        bank_account:
          type: string
          nullable: true
          example: "12345678901234"
        is_active:
          type: boolean
          example: true
        is_deleted:
          type: boolean
          example: false
    EmployeeDocument:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        doc_name:
          type: string
          example: شهادة التخرج الجامعية
        file_path:
          type: string
          example: /uploads/documents/emp-5-degree.pdf
    EmployeeRelative:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        relation:
          type: string
          example: أب
        name:
          type: string
          example: محمود مصطفى علي
        phone:
          type: string
          example: "01211223344"
        is_deleted:
          type: boolean
          example: false
    EmployeeExperience:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        company_name:
          type: string
          example: الشركة العالمية للحلول التقنية
        position:
          type: string
          example: مهندس تطوير برمجيات أول
        from_date:
          type: string
          format: date
          example: "2022-01-01"
        to_date:
          type: string
          format: date
          nullable: true
          example: "2025-12-31"
        is_deleted:
          type: boolean
          example: false
    Contract:
      type: object
      properties:
        id:
          type: integer
          example: 2
        employee_id:
          type: integer
          example: 5
        department_id:
          type: integer
          example: 4
        shift_id:
          type: integer
          example: 1
        job_title:
          type: string
          example: مطور برمجيات أول
        start_date:
          type: string
          format: date
          example: "2026-01-01"
        duration_years:
          type: number
          nullable: true
          example: 2
        end_date:
          type: string
          format: date
          nullable: true
          example: "2027-12-31"
        base_salary:
          type: number
          example: 15000.00
        status:
          type: string
          enum: [active, suspended, resigned, dismissed]
          example: active
        overtime_enabled:
          type: boolean
          example: true
        notes:
          type: string
          nullable: true
          example: تم توقيع العقد في المقر الرئيسي
        attachment:
          type: string
          nullable: true
          example: /uploads/contracts/contract-5.pdf
        insurance_setting_id:
          type: integer
          nullable: true
          example: 1
        is_active:
          type: boolean
          example: true
    ContractAllowance:
      type: object
      properties:
        id:
          type: integer
          example: 1
        contract_id:
          type: integer
          example: 2
        allowance_type_id:
          type: integer
          example: 1
        amount:
          type: number
          example: 1500.00
        is_deleted:
          type: boolean
          example: false
    ContractLeave:
      type: object
      properties:
        id:
          type: integer
          example: 1
        contract_id:
          type: integer
          example: 2
        leave_type_id:
          type: integer
          example: 1
        used_days:
          type: number
          example: 4
        year:
          type: integer
          example: 2026
    Custody:
      type: object
      properties:
        id:
          type: integer
          example: 1
        from_employee_id:
          type: integer
          nullable: true
          example: null
        to_employee_id:
          type: integer
          example: 5
        item_name:
          type: string
          example: MacBook Pro M3 - Serial 829410A
        transfer_type:
          type: string
          enum: [handover, receive, transfer]
          example: handover
        transfer_date:
          type: string
          format: date
          example: "2026-06-18"
        notes:
          type: string
          nullable: true
          example: الجهاز في حالة جديدة
        is_deleted:
          type: boolean
          example: false
    EmployeeLoan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        type:
          type: string
          enum: [advance, loan]
          example: loan
        amount:
          type: number
          example: 12000.00
        grant_date:
          type: string
          format: date
          example: "2026-06-01"
        installment_amount:
          type: number
          nullable: true
          example: 1000.00
        paid_amount:
          type: number
          example: 3000.00
        status:
          type: string
          enum: [active, settled]
          example: active
        approval_status:
          type: string
          enum: [pending, approved, rejected]
          default: pending
          example: pending
        approved_by:
          type: integer
          nullable: true
          example: null
        approved_at:
          type: string
          format: date-time
          nullable: true
          example: null
        rejection_reason:
          type: string
          nullable: true
          example: null
        is_deleted:
          type: boolean
          example: false
    EmployeeBonus:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        bonus_type_id:
          type: integer
          example: 1
        amount:
          type: number
          example: 2500.00
        grant_date:
          type: string
          format: date
          example: "2026-06-18"
        is_paid:
          type: boolean
          example: false
        payment_month:
          type: integer
          nullable: true
          example: 6
        payment_year:
          type: integer
          nullable: true
          example: 2026
        approval_status:
          type: string
          enum: [pending, approved, rejected]
          default: pending
          example: pending
        approved_by:
          type: integer
          nullable: true
          example: null
        approved_at:
          type: string
          format: date-time
          nullable: true
          example: null
        rejection_reason:
          type: string
          nullable: true
          example: null
        is_deleted:
          type: boolean
          example: false
    Absence:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        absence_type_id:
          type: integer
          example: 2
        absence_date:
          type: string
          format: date
          example: "2026-06-15"
        deduction_days:
          type: number
          example: 2.0
        notes:
          type: string
          nullable: true
          example: غياب غير مبرر يوم الإثنين
        is_deleted:
          type: boolean
          example: false
    LeaveRequest:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        leave_type_id:
          type: integer
          example: 1
        start_date:
          type: string
          format: date
          example: "2026-07-01"
        end_date:
          type: string
          format: date
          example: "2026-07-05"
        days_count:
          type: number
          example: 5.0
        status:
          type: string
          enum: [pending, approved, rejected]
          example: pending
        reason:
          type: string
          nullable: true
          example: إجازة عائلية طارئة
        is_deleted:
          type: boolean
          example: false
    Attendance:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employee_id:
          type: integer
          example: 5
        work_date:
          type: string
          format: date
          example: "2026-06-18"
        check_in:
          type: string
          nullable: true
          example: "08:58:32"
        check_out:
          type: string
          nullable: true
          example: "17:03:15"
        late_minutes:
          type: integer
          example: 0
        overtime_hours:
          type: number
          example: 0.00
        notes:
          type: string
          nullable: true
          example: حضور اعتيادي
        is_deleted:
          type: boolean
          example: false
    PayrollRun:
      type: object
      properties:
        id:
          type: integer
          example: 8
        month:
          type: integer
          example: 6
        year:
          type: integer
          example: 2026
        status:
          type: string
          enum: [draft, confirmed, paid]
          example: draft
        is_deleted:
          type: boolean
          example: false
    PayrollDetail:
      type: object
      properties:
        id:
          type: integer
          example: 41
        employee_id:
          type: integer
          example: 5
        payroll_run_id:
          type: integer
          example: 8
        base_salary:
          type: number
          example: 15000.00
        total_bonuses:
          type: number
          example: 2500.00
        overtime_pay:
          type: number
          example: 450.00
        total_earnings:
          type: number
          example: 19450.00
        insurance_employee:
          type: number
          example: 1650.00
        insurance_company:
          type: number
          example: 2100.00
        loan_deduction:
          type: number
          example: 1000.00
        absence_days:
          type: number
          example: 0.00
        absence_deduction:
          type: number
          example: 0.00
        total_deductions:
          type: number
          example: 2650.00
        net_salary:
          type: number
          example: 16650.00
        Employee:
          type: object
          properties:
            full_name:
              type: string
              example: سامح محمد محمود
            code:
              type: string
              example: EMP-2026-003
    JournalLine:
      type: object
      properties:
        id:
          type: integer
          example: 101
        journal_entry_id:
          type: integer
          example: 55
        account_id:
          type: integer
          example: 12
        account_code:
          type: string
          example: "51001"
        account_name:
          type: string
          example: مصروف رواتب
        debit:
          type: number
          example: 15000.00
        credit:
          type: number
          example: 0.00
        description:
          type: string
          nullable: true
          example: استحقاق راتب أساسي
        employee_id:
          type: integer
          nullable: true
          example: 5
        cost_center_id:
          type: integer
          nullable: true
    JournalEntry:
      type: object
      properties:
        id:
          type: integer
          example: 55
        entry_type:
          type: string
          example: payroll_accrual
        description:
          type: string
          example: استحقاق راتب 6/2026 – سامح محمد
        payroll_run_id:
          type: integer
          nullable: true
          example: 8
        reference_type:
          type: string
          nullable: true
          example: employee
        reference_id:
          type: integer
          nullable: true
          example: 5
        posting_date:
          type: string
          format: date
          example: "2026-06-30"
        total_debit:
          type: number
          example: 15000.00
        total_credit:
          type: number
          example: 15000.00
        status:
          type: string
          enum: [draft, posted, cancelled]
          example: posted
        created_by:
          type: integer
          nullable: true
          example: 2
        is_deleted:
          type: boolean
          example: false
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLine'
    CreateJournalEntryRequest:
      type: object
      required: [entry_type, description, lines]
      properties:
        entry_type:
          type: string
          example: payroll_accrual
        description:
          type: string
          example: استحقاق راتب يونيو 2026
        payroll_run_id:
          type: integer
          nullable: true
          example: 8
        reference_type:
          type: string
          nullable: true
          example: employee
        reference_id:
          type: integer
          nullable: true
          example: 5
        posting_date:
          type: string
          format: date
          example: "2026-06-30"
        status:
          type: string
          enum: [draft, posted, cancelled]
          example: posted
        lines:
          type: array
          minItems: 2
          items:
            type: object
            required: [account_id]
            properties:
              account_id:
                type: integer
                example: 10
              debit:
                type: number
                minimum: 0
                example: 15000
              credit:
                type: number
                minimum: 0
                example: 0
              description:
                type: string
                nullable: true
              employee_id:
                type: integer
                nullable: true
              cost_center_id:
                type: integer
                nullable: true
    AccountingPeriod:
      type: object
      properties:
        id:
          type: integer
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        status:
          type: string
          enum: [open, closed]
        closed_by:
          type: integer
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuditLog:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        user_name:
          type: string
          nullable: true
        user_role:
          type: string
          nullable: true
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE, LOGIN, LOGOUT, APPROVE, REJECT]
        entity_type:
          type: string
        entity_id:
          type: integer
          nullable: true
        old_values:
          type: object
          nullable: true
        new_values:
          type: object
          nullable: true
        ip_address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DEGRADED, DOWN]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        services:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                  enum: [UP, DOWN]
                error:
                  type: string
                  nullable: true
            email:
              type: object
              properties:
                status:
                  type: string
                  enum: [CONFIGURED, NOT_CONFIGURED]
    PeriodClosedError:
      type: object
      properties:
        meta:
          type: object
          properties:
            status:
              type: integer
              example: 403
            success:
              type: boolean
              example: false
        error:
          type: object
          properties:
            message:
              type: string
              example: "الفترة المحاسبية مقفولة ولا يمكن تعديل بيانات هذا الشهر"
    SuccessResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
    PaginatedResponse:
      type: object
      properties:
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                pagination:
                  type: object
                  properties:
                    page:
                      type: integer
                    limit:
                      type: integer
                    totalItems:
                      type: integer
                    totalPages:
                      type: integer
        data:
          type: array
          items:
            type: object
