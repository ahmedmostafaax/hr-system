# ERB Payroll — Nginx reverse proxy
# Place at: /etc/nginx/sites-available/erb
# Enable: sudo ln -sf /etc/nginx/sites-available/erb /etc/nginx/sites-enabled/erb
# Test & reload: sudo nginx -t && sudo systemctl reload nginx

upstream erb_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream erb_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name 56.228.41.132 _;

    client_max_body_size 20M;

    # Backend health check
    location /health {
        proxy_pass http://erb_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — direct to Express
    location /api/v1/ {
        proxy_pass http://erb_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Next.js auth routes (server-side cookie login)
    location /api/auth/ {
        proxy_pass http://erb_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js app (frontend)
    location / {
        proxy_pass http://erb_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
